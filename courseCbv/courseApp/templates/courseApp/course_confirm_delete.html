<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Deletion</title>
</head>
<body>
    <h1>Do you want to delete {{ course.name }} ?</h1>
    <form method="post">
        {% csrf_token %}
        
        <input type="submit" value="Confirm">
        <a href="{% url 'coursedetail' course.id %}">Cancel</a>
    </form>
    
</body>
</html>
