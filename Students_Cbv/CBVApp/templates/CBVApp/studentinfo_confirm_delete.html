<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Deletion Page</title>
</head>
<body>
    <h2>Do you want to delete {{ studentinfo.name }} ?</h2>
    <form method="POST">
        {% csrf_token %}
        <input type="submit" value="Confirm">
        <a href="{% url 'detail' studentinfo.id %}">Cancel</a>
    </form>
    
</body>
</html>
