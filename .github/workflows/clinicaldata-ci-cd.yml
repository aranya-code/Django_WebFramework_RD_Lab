name: Django CI-CD

on:
  push:
    branches:
      - main
    paths:
      - 'clinicalData/**'
      - '.github/workflows/clinicaldata-ci-cd.yml'

  pull_request:
    branches:
      - main
    paths:
      - 'clinicalData/**'
      - '.github/workflows/clinicaldata-ci-cd.yml'

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0

        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: mydb
          MYSQL_USER: django_user
          MYSQL_PASSWORD: django_pass
          SECRET_KEY: ${{ secrets.django_secret_key }}

        ports:
          - 3306:3306

        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -u django_user -pdjango_pass"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DB_HOST: 127.0.0.1
      DB_NAME: mydb
      DB_USER: django_user
      DB_PASSWORD: django_pass
      SECRET_KEY: ${{ secrets.django_secret_key }}

    defaults:
      run:
        working-directory: clinicalData

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Debug repo structure
        run: |
          pwd
          ls -la
          find . -name "requirements.txt"
          find . -name "manage.py"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install MySQL dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y default-libmysqlclient-dev pkg-config

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Wait for MySQL
        run: |
          until mysqladmin ping -h 127.0.0.1 -u django_user -pdjango_pass --silent
          do
            echo "Waiting for MySQL..."
            sleep 2
          done

      - name: Grant MySQL privileges
        run: |
          mysql -h 127.0.0.1 -uroot -proot -e "
            GRANT ALL PRIVILEGES ON *.* TO 'django_user'@'%';
            FLUSH PRIVILEGES;
          "

      - name: Run migrations
        run: |
          python manage.py migrate

      - name: Run tests
        run: |
          python manage.py test

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Build Docker image
        run: |
          docker build -t aranya3/django-app:latest .
      
      - name: Push Docker image
        run: |
          docker push aranya3/django-app:latest
          
