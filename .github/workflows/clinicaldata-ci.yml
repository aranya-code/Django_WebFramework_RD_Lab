name: Django CI

on:
  push:
    branches: ["main"]

  pull_request:
    branches: ["main"]

jobs:
  build:

    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0

        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: mydb
          MYSQL_USER: django_user
          MYSQL_PASSWORD: django_pass

        ports:
          - 3306:3306

        options: >-
          --health-cmd="mysqladmin ping -h localhost -u django_user -pdjango_pass"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Debug files
        run: |
          pwd
          ls -la

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install MySQL client libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y default-libmysqlclient-dev pkg-config

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Wait for MySQL
        run: |
          until mysqladmin ping -h 127.0.0.1 -u django_user -pdjango_pass --silent; do
            echo "Waiting for MySQL..."
            sleep 2
          done

      - name: Run migrations
        env:
          DB_HOST: 127.0.0.1
          DB_NAME: mydb
          DB_USER: django_user
          DB_PASSWORD: django_pass
        run: |
          python manage.py migrate

      - name: Run tests
        env:
          DB_HOST: 127.0.0.1
          DB_NAME: mydb
          DB_USER: django_user
          DB_PASSWORD: django_pass
        run: |
          python manage.py test
